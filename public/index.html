<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PopSauce</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --orange: #E8562A;
    --orange-dark: #C94520;
    --orange-light: #FFF0EB;
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f1c40f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #root { width: 100%; max-width: 600px; padding: 1rem; flex: 1; display: flex; flex-direction: column; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; gap: 1rem; flex: 1; }
  .screen.active { display: flex; }

  /* LOGO */
  .logo { text-align: center; padding: 1.5rem 0 0.5rem; }
  .logo h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }
  .logo h1 span.pop { color: var(--orange); }
  .logo h1 span.sauce { color: var(--text); }
  .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }

  /* INPUTS */
  input[type=text] {
    width: 100%; height: 48px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 1rem; padding: 0 14px;
    outline: none; transition: border 0.2s;
  }
  input[type=text]:focus { border-color: var(--orange); }

  /* BUTTONS */
  .btn {
    height: 48px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 1rem; font-weight: 600; transition: transform 0.1s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--orange-dark); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { border-color: var(--orange); }
  .btn-full { width: 100%; }

  /* AVATAR PICKER */
  .avatar-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 0.5rem 0; }
  .av-btn { font-size: 1.8rem; background: var(--surface2); border: 2px solid transparent; border-radius: 10px; width: 52px; height: 52px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; }
  .av-btn:hover { transform: scale(1.1); }
  .av-btn.selected { border-color: var(--orange); background: rgba(232,86,42,0.15); }

  /* LOBBY */
  .lobby-code { text-align: center; }
  .lobby-code .code-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .lobby-code .code { font-size: 3rem; font-weight: 900; letter-spacing: 6px; color: var(--orange); cursor: pointer; }
  .lobby-code .code-hint { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .players-list { display: flex; flex-direction: column; gap: 8px; }
  .player-row { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: 10px; padding: 10px 14px; }
  .player-av { font-size: 1.4rem; width: 36px; text-align: center; }
  .player-name { flex: 1; font-weight: 500; }
  .player-host { font-size: 0.75rem; color: var(--orange); }
  .player-pts { font-weight: 700; color: var(--orange); font-size: 0.95rem; }

  /* SCOREBOARD MINI */
  .scoreboard-mini { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .score-chip { background: var(--surface2); border-radius: 999px; padding: 4px 12px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; border: 1px solid var(--border); }
  .score-chip.leader { border-color: var(--orange); }
  .score-chip .chip-av { font-size: 0.95rem; }
  .score-chip .chip-name { color: var(--muted); }
  .score-chip .chip-pts { font-weight: 700; }

  /* TIMER */
  .timer-bar-wrap { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 1rem; }
  #timer-bar { height: 100%; width: 100%; border-radius: 4px; transition: width 0.5s linear, background 0.3s; background: var(--orange); }
  .timer-bar-wrap.urgent #timer-bar { background: var(--red); }

  /* QUESTION */
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .q-num { font-size: 0.8rem; color: var(--muted); }
  .q-theme { font-size: 0.8rem; background: rgba(232,86,42,0.15); color: var(--orange); padding: 3px 12px; border-radius: 999px; border: 1px solid rgba(232,86,42,0.3); }
  .q-emoji { text-align: center; font-size: 5rem; padding: 0.75rem 0; line-height: 1; }
  .q-text { text-align: center; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
  .q-hint { text-align: center; font-size: 0.875rem; color: var(--muted); margin-bottom: 1rem; }

  /* ANSWER */
  .answer-row { display: flex; gap: 8px; }
  .answer-row input { flex: 1; }
  .answer-row .btn { width: 100px; }

  /* FEEDBACK */
  .feedback-bar { border-radius: 10px; padding: 12px 16px; text-align: center; font-weight: 700; font-size: 1rem; margin-top: 0.75rem; animation: popIn 0.2s ease; }
  .feedback-bar.correct { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: var(--green); }
  .feedback-bar.wrong { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #ff8a80; }
  .feedback-bar.timeout { background: rgba(241,196,15,0.1); border: 1px solid rgba(241,196,15,0.3); color: var(--yellow); }

  /* ANSWERED PLAYERS */
  .answered-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
  .answered-chip { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3); border-radius: 999px; padding: 3px 10px; font-size: 0.8rem; color: var(--green); }

  /* END */
  .podium { display: flex; flex-direction: column; gap: 10px; margin: 1rem 0; }
  .podium-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; background: var(--surface2); }
  .podium-row.rank-1 { background: rgba(241,196,15,0.1); border: 1px solid rgba(241,196,15,0.3); }
  .podium-row.rank-2 { background: rgba(189,195,199,0.07); border: 1px solid rgba(189,195,199,0.2); }
  .podium-row.rank-3 { background: rgba(205,127,50,0.07); border: 1px solid rgba(205,127,50,0.2); }
  .podium-rank { font-size: 1.4rem; width: 32px; text-align: center; }
  .podium-av { font-size: 1.6rem; }
  .podium-name { flex: 1; font-weight: 600; font-size: 1rem; }
  .podium-score { font-weight: 800; font-size: 1.1rem; color: var(--orange); }

  /* NOTIFICATIONS */
  #notif { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
  .notif-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 0.875rem; animation: slideIn 0.25s ease; max-width: 240px; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

  .section-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .divider { text-align: center; color: var(--muted); font-size: 0.85rem; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
</style>
</head>
<body>
<div id="root">
  <div id="notif"></div>

  <!-- SCREEN: HOME -->
  <div id="screen-home" class="screen active">
    <div class="logo">
      <h1><span class="pop">Pop</span><span class="sauce">Sauce</span></h1>
      <p>Quiz multijoueur en temps réel</p>
    </div>
    <div class="card">
      <div class="section-label">Ton pseudo</div>
      <input type="text" id="home-name" placeholder="Entre ton pseudo..." maxlength="20" style="margin-bottom:12px;"/>
      <div class="section-label">Ton avatar</div>
      <div class="avatar-grid" id="avatar-grid"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-create">🎮 Créer une salle</button>
    <div class="divider">ou</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="join-code" placeholder="Code de salle (ex: AB3K)" maxlength="4" style="text-transform:uppercase;letter-spacing:3px;font-weight:700;font-size:1.1rem;"/>
      <button class="btn btn-secondary" id="btn-join" style="width:130px;">Rejoindre</button>
    </div>
  </div>

  <!-- SCREEN: LOBBY -->
  <div id="screen-lobby" class="screen">
    <div class="logo">
      <h1><span class="pop">Pop</span><span class="sauce">Sauce</span></h1>
    </div>
    <div class="card lobby-code">
      <div class="code-label">Code de la salle</div>
      <div class="code" id="room-code-display" title="Cliquer pour copier">????</div>
      <div class="code-hint">Partage ce code à tes amis !</div>
    </div>
    <div class="card">
      <div class="section-label" id="players-count">Joueurs (0)</div>
      <div class="players-list" id="lobby-players"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-start" disabled>Lancer la partie ▶</button>
    <button class="btn btn-secondary btn-full" id="btn-leave">Quitter</button>
  </div>

  <!-- SCREEN: GAME -->
  <div id="screen-game" class="screen">
    <div class="scoreboard-mini" id="scoreboard-mini"></div>
    <div class="card">
      <div class="q-meta">
        <span class="q-num" id="g-qnum">Q1/10</span>
        <span class="q-theme" id="g-theme">Thème</span>
      </div>
      <div class="timer-bar-wrap" id="timer-wrap"><div id="timer-bar"></div></div>
      <div class="q-emoji" id="g-emoji">❓</div>
      <div class="q-text" id="g-question">Question...</div>
      <div class="q-hint" id="g-hint">Indice...</div>
      <div class="answer-row">
        <input type="text" id="g-answer" placeholder="Ta réponse..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="btn btn-primary" id="btn-answer">OK</button>
      </div>
      <div id="g-feedback" style="display:none;"></div>
    </div>
    <div style="margin-top:0.25rem;">
      <div class="section-label">Ont répondu</div>
      <div class="answered-list" id="answered-list"></div>
    </div>
  </div>

  <!-- SCREEN: SCORES (between questions) -->
  <div id="screen-scores" class="screen">
    <div class="logo">
      <h1 style="font-size:1.5rem;">Scores</h1>
    </div>
    <div class="card">
      <div class="players-list" id="inter-scores"></div>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:0.85rem;">Prochaine question dans un instant...</p>
  </div>

  <!-- SCREEN: END -->
  <div id="screen-end" class="screen">
    <div class="logo">
      <h1 style="font-size:1.8rem;">🏆 Fin de partie !</h1>
      <p id="winner-txt"></p>
    </div>
    <div class="card">
      <div class="podium" id="podium"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-restart" style="display:none;">Rejouer ▶</button>
    <button class="btn btn-secondary btn-full" id="btn-home">Retour à l'accueil</button>
  </div>
</div>

<script>
const AVATARS = ['😎','🥳','🤩','🦊','🐼','🐸','🦄','🐙','🤖','👾','🦁','🐯','🐧','🦋','🔥','⭐'];
const socket = io();

let myRoom = null;
let myName = '';
let myAvatar = AVATARS[0];
let isHost = false;
let myId = null;
let answered = false;

// AVATAR GRID
const grid = document.getElementById('avatar-grid');
AVATARS.forEach(av => {
  const btn = document.createElement('button');
  btn.className = 'av-btn' + (av === myAvatar ? ' selected' : '');
  btn.textContent = av;
  btn.onclick = () => {
    myAvatar = av;
    document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };
  grid.appendChild(btn);
});

// SCREENS
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// NOTIFICATIONS
function notif(msg, duration = 3000) {
  const el = document.createElement('div');
  el.className = 'notif-item';
  el.textContent = msg;
  document.getElementById('notif').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// HOME actions
document.getElementById('btn-create').onclick = () => {
  myName = document.getElementById('home-name').value.trim();
  if (!myName) { notif('Entre ton pseudo !'); return; }
  socket.emit('create_room', { name: myName, avatar: myAvatar });
};

document.getElementById('btn-join').onclick = joinRoom;
document.getElementById('join-code').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
document.getElementById('join-code').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });

function joinRoom() {
  myName = document.getElementById('home-name').value.trim();
  if (!myName) { notif('Entre ton pseudo !'); return; }
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (code.length !== 4) { notif('Code invalide (4 lettres)'); return; }
  socket.emit('join_room', { code, name: myName, avatar: myAvatar });
}

// LOBBY
document.getElementById('room-code-display').onclick = () => {
  navigator.clipboard.writeText(myRoom).catch(() => {});
  notif('Code copié ! 📋');
};

document.getElementById('btn-start').onclick = () => socket.emit('start_game');
document.getElementById('btn-leave').onclick = () => { location.reload(); };
document.getElementById('btn-home').onclick = () => { location.reload(); };
document.getElementById('btn-restart').onclick = () => socket.emit('start_game');

// ANSWER
document.getElementById('btn-answer').onclick = sendAnswer;
document.getElementById('g-answer').addEventListener('keydown', e => { if (e.key === 'Enter') sendAnswer(); });

function sendAnswer() {
  if (answered) return;
  const val = document.getElementById('g-answer').value.trim();
  if (!val) return;
  socket.emit('answer', { answer: val });
}

// SOCKET EVENTS
socket.on('connect', () => { myId = socket.id; });

socket.on('room_created', ({ code }) => {
  myRoom = code;
  isHost = true;
  document.getElementById('room-code-display').textContent = code;
  document.getElementById('btn-start').disabled = false;
  show('lobby');
});

socket.on('room_joined', ({ code }) => {
  myRoom = code;
  isHost = false;
  document.getElementById('room-code-display').textContent = code;
  document.getElementById('btn-start').disabled = true;
  show('lobby');
});

socket.on('error', msg => notif('❌ ' + msg));

socket.on('new_host', id => {
  if (id === socket.id) {
    isHost = true;
    document.getElementById('btn-start').disabled = false;
    notif('Tu es maintenant l\'hôte !');
  }
});

socket.on('players', players => {
  document.getElementById('players-count').textContent = `Joueurs (${players.length})`;
  const list = document.getElementById('lobby-players');
  list.innerHTML = players.map((p, i) => `
    <div class="player-row">
      <div class="player-av">${p.avatar}</div>
      <div class="player-name">${p.name}${p.id === myId ? ' (toi)' : ''}</div>
      ${i === 0 ? '<div class="player-host">👑 hôte</div>' : ''}
    </div>
  `).join('');
});

socket.on('game_start', () => {
  answered = false;
  document.getElementById('g-feedback').style.display = 'none';
  document.getElementById('answered-list').innerHTML = '';
  show('game');
});

socket.on('question', ({ index, total, theme, emoji, question, hint, timer }) => {
  answered = false;
  document.getElementById('g-qnum').textContent = `Q${index + 1}/${total}`;
  document.getElementById('g-theme').textContent = theme;
  document.getElementById('g-emoji').textContent = emoji;
  document.getElementById('g-question').textContent = question;
  document.getElementById('g-hint').textContent = hint;
  document.getElementById('g-answer').value = '';
  document.getElementById('g-answer').disabled = false;
  document.getElementById('btn-answer').disabled = false;
  document.getElementById('g-feedback').style.display = 'none';
  document.getElementById('answered-list').innerHTML = '';
  document.getElementById('timer-bar').style.width = '100%';
  document.getElementById('timer-bar').style.background = '';
  document.getElementById('timer-wrap').classList.remove('urgent');
  show('game');
});

socket.on('tick', ({ timeLeft }) => {
  const pct = (timeLeft / 20) * 100;
  document.getElementById('timer-bar').style.width = Math.max(0, pct) + '%';
  if (pct < 25) document.getElementById('timer-wrap').classList.add('urgent');
});

socket.on('answer_result', ({ correct, pts }) => {
  const fb = document.getElementById('g-feedback');
  fb.style.display = 'block';
  if (correct) {
    answered = true;
    document.getElementById('g-answer').disabled = true;
    document.getElementById('btn-answer').disabled = true;
    fb.className = 'feedback-bar correct';
    fb.textContent = `✅ Correct ! +${pts} pts`;
  } else {
    fb.className = 'feedback-bar wrong';
    fb.textContent = '❌ Faux, réessaie !';
    setTimeout(() => { if (!answered) fb.style.display = 'none'; }, 1200);
  }
});

socket.on('player_answered', ({ name, correct }) => {
  if (correct) {
    const chip = document.createElement('div');
    chip.className = 'answered-chip';
    chip.textContent = name;
    document.getElementById('answered-list').appendChild(chip);
  }
});

socket.on('timeout', ({ answer }) => {
  const fb = document.getElementById('g-feedback');
  fb.style.display = 'block';
  fb.className = 'feedback-bar timeout';
  fb.textContent = `⏱ Temps écoulé ! Réponse : ${answer}`;
  document.getElementById('g-answer').disabled = true;
  document.getElementById('btn-answer').disabled = true;
});

socket.on('all_answered', ({ answer }) => {
  const fb = document.getElementById('g-feedback');
  fb.style.display = 'block';
  fb.className = 'feedback-bar correct';
  fb.textContent = `Tout le monde a répondu ! ✅ ${answer}`;
});

socket.on('scores', scores => {
  const inter = document.getElementById('inter-scores');
  inter.innerHTML = scores.map((p, i) => `
    <div class="player-row">
      <div class="player-av">${p.avatar}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-pts">${p.score} pts</div>
    </div>
  `).join('');
  // mini scoreboard
  const mini = document.getElementById('scoreboard-mini');
  mini.innerHTML = scores.map((p, i) => `
    <div class="score-chip ${i === 0 ? 'leader' : ''}">
      <span class="chip-av">${p.avatar}</span>
      <span class="chip-name">${p.name}</span>
      <span class="chip-pts">${p.score}</span>
    </div>
  `).join('');
});

socket.on('game_over', scores => {
  const medals = ['🥇','🥈','🥉'];
  const ranks = ['rank-1','rank-2','rank-3'];
  document.getElementById('winner-txt').textContent = scores.length > 0 ? `Bravo ${scores[0].name} ! 🎉` : '';
  document.getElementById('podium').innerHTML = scores.map((p, i) => `
    <div class="podium-row ${ranks[i] || ''}">
      <div class="podium-rank">${medals[i] || (i+1)+'.'}</div>
      <div class="podium-av">${p.avatar}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${p.score} pts</div>
    </div>
  `).join('');
  if (isHost) document.getElementById('btn-restart').style.display = 'flex';
  show('end');
});
</script>
</body>
</html>
